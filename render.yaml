services:
  - type: web
    name: tinvit-api
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn src.news_engine.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tinvit-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOG_LEVEL
        value: INFO
      - key: CRAWLER_TIMEOUT
        value: 30

databases:
  - name: tinvit-db
    plan: free
    databaseName: newsdb
    ipAllowList: []
